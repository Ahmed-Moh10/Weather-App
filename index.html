<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="images/logo@2x.png" type="image/x-icon" />
    <title>Weather App</title>
  </head>
  <body>
    <div class="home">
      <div class="container py-3">
        <!-- navbar -->
        <nav class="homenavbar navbar navbar-expand-lg navbar-dark px-0">
          <div class="container-fluid px-0">
            <a
              class="navbar-brand d-flex align-items-center gap-3"
              href="index.html"
            >
              <img src="images/logo@2x.png" width="80" alt="logo" />
              <div class="brand-text">
                Weather
                <span>tagline goes here</span>
              </div>
            </a>

            <button
              class="navbar-toggler border-0 shadow-none"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarSupportedContent"
              aria-controls="navbarSupportedContent"
              aria-expanded="false"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>

            <div
              class="collapse navbar-collapse mt-3 mt-lg-0"
              id="navbarSupportedContent"
            >
              <ul
                class="navbar-nav ms-auto mb-2 mb-lg-0 text-center text-lg-start"
              >
                <li class="nav-item">
                  <a
                    class="navbaractive nav-link"
                    aria-current="page"
                    href="index.html"
                    >Home</a
                  >
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">News</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Live cameras</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Photos</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="contact.html" id="contactlink"
                    >Contact</a
                  >
                </li>
              </ul>
            </div>
          </div>
        </nav>

        <div class="backgroundimg"></div>

        <!-- input -->
        <div class="location_input input-group position-relative mx-auto mb-3">
          <input
            id="locationinput"
            type="text"
            class="form-control p-3 rounded-pill"
            placeholder="Find your location..."
            aria-label="location"
          />
          <button
            class="btn rounded-pill position-absolute top-50 translate-middle-y end-0"
            type="button"
            id="locationbtn"
          >
            Find
          </button>
        </div>

        <!-- layout -->
        <div class="weather_data">
          <div class="container px-0">
            <div class="row g-0" id="datacolums"></div>
          </div>
        </div>
      </div>

      <!-- footer -->
      <div class="footer py-5">
        <div class="container">
          <div class="row gy-4 align-items-center">
            <div class="col-12 col-lg-8">
              <div class="location_input input-group position-relative mb-3">
                <input
                  type="text"
                  class="form-control p-3 rounded-pill"
                  placeholder="Enter your email to subscribe..."
                  aria-label="email"
                />
                <button
                  class="btn rounded-pill position-absolute top-50 translate-middle-y end-0"
                  type="button"
                >
                  Subscribe
                </button>
              </div>

              <span class="copyright d-block text-center text-lg-start">
                Copyright 2014 Company name. Designed by Themezy. All rights
                reserved
              </span>
            </div>

            <div class="col-12 col-lg-4">
              <div
                class="footer_icons d-flex justify-content-center justify-content-lg-end flex-wrap gap-2"
              >
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-google-plus-g"></i></a>
                <a href="#"><i class="fa-brands fa-pinterest"></i></a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
